document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ily: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }\n    * { box-sizing: border-box; }\n    input, textarea, select, button { font-family: inherit; }\n    ::placeholder { color: oklch(58% 0.02 250); }\n  <\u002Fstyle>\n  \n<\u002Fhelmet>\n\n<div style=\"{{ styles.outer }}\">\n\n  <div style=\"{{ styles.stage }}\">\n\n    <sc-if value=\"{{ screen === 'home' }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"01 Inicio\" style=\"{{ styles.heroWrap }}\">\n        <div style=\"{{ styles.blob1 }}\"><\u002Fdiv>\n        <div style=\"{{ styles.blob2 }}\"><\u002Fdiv>\n        <div style=\"{{ styles.blob3 }}\"><\u002Fdiv>\n\n        <div style=\"{{ styles.heroTop }}\">\n          <div style=\"{{ styles.brandRow }}\">\n            <div style=\"{{ styles.shieldMark }}\"><\u002Fdiv>\n            <div style=\"{{ styles.brandName }}\">Protección Infantil<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"{{ styles.authRow }}\">\n            <button style=\"{{ styles.linkGhostLight }}\" sc-camel-on-click=\"{{ () =&gt; go('login') }}\">Iniciar sesión<\u002Fbutton>\n            <button style=\"{{ styles.btnLight }}\" sc-camel-on-click=\"{{ () =&gt; go('register') }}\">Crear cuenta<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"{{ styles.heroCenter }}\">\n          <div style=\"{{ styles.heroEyebrow }}\">Cuidado comunitario en internet<\u002Fdiv>\n          <h1 style=\"{{ styles.heroTitle }}\">Consulta antes de conectar<\u002Fh1>\n          <p style=\"{{ styles.heroSub }}\">Busca un número, usuario o nick para ver si otras familias han dejado información sobre esa cuenta. Gratis, en segundos, sin necesidad de registrarte.<\u002Fp>\n\n          <div style=\"{{ styles.searchCard }}\">\n            <div style=\"{{ styles.searchLabel }}\">Número, usuario o nick<\u002Fdiv>\n            <div style=\"{{ styles.searchRow }}\">\n              <input style=\"{{ styles.searchInput }}\" placeholder=\"Ej. +57 300 123 4567 o @usuario\" value=\"{{ searchQuery }}\" sc-camel-on-change=\"{{ onSearchChange }}\">\n              <button style=\"{{ styles.searchBtn }}\" sc-camel-on-click=\"{{ doSearch }}\" disabled=\"{{ searchDisabled }}\">Buscar<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"{{ styles.searchHint }}\">Funciona con WhatsApp, Instagram, TikTok, Roblox, Discord y otras plataformas.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"{{ styles.heroBottomLinks }}\">\n          <button style=\"{{ styles.linkGhostLight }}\" sc-camel-on-click=\"{{ () =&gt; go('parent') }}\">Panel de padre<\u002Fbutton>\n          <span style=\"{{ styles.dotSep }}\">·<\u002Fspan>\n          <button style=\"{{ styles.linkGhostLight }}\" sc-camel-on-click=\"{{ () =&gt; go('school') }}\">Panel de colegio<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ screen === 'result' }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"02 Resultado\" style=\"{{ styles.page }}\">\n        <div style=\"{{ styles.topBar }}\">\n          <button style=\"{{ styles.backBtn }}\" sc-camel-on-click=\"{{ () =&gt; go('home') }}\">‹ Inicio<\u002Fbutton>\n          <div style=\"{{ styles.topBarTitle }}\">Resultado de consulta<\u002Fdiv>\n          <div style=\"{{ styles.topBarSpacer }}\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"{{ styles.content }}\">\n          <div style=\"{{ styles.resultHeadCard }}\">\n            <div style=\"{{ styles.resultQuery }}\">{{ resultData.phone }}<\u002Fdiv>\n            <div style=\"{{ styles.resultCount }}\">{{ resultData.totalReports }} reportes registrados por la comunidad<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"{{ styles.noticeBanner }}\">\n            Estos reportes son descripciones hechas por otras familias. No son una acusación ni una sentencia — te ayudan a decidir con más información. Si crees que un menor está en riesgo, on>\n      <option value=\"parent\">09 Panel padre<\u002Foption>\n      <option value=\"school\">10 Panel colegio<\u002Foption>\n    <\u002Fsc-raw-select>\n    <button style=\"{{ styles.devToggle }}\" sc-camel-on-click=\"{{ toggleViewport }}\">{{ viewportLabel }}<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst C = {\n  bg: 'oklch(96% 0.013 88)',\n  surface: '#ffffff',\n  ink: 'oklch(24% 0.03 250)',\n  inkSoft: 'oklch(46% 0.02 250)',\n  inkFaint: 'oklch(62% 0.015 250)',\n  primary: 'oklch(40% 0.09 235)',\n  primaryDark: 'oklch(27% 0.07 235)',\n  primarySoft: 'oklch(92% 0.03 235)',\n  accent: 'oklch(64% 0.1 165)',\n  accentSoft: 'oklch(93% 0.035 165)',\n  line: 'oklch(90% 0.012 90)',\n  danger: 'oklch(55% 0.14 30)'\n};\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    history: ['home'],\n    viewport: 'mobile',\n    searchQuery: '',\n    loginEmail: '', loginPass: '',\n    regName: '', regEmail: '', regPass: '',\n    codeDigits: ['', '', '', '', '', ''],\n    codeError: false,\n    reportPlatform: 'WhatsApp',\n    reportContact: '',\n    reportCity: '', reportCountry: '', reportDate: '',\n    reportDesc: '',\n    reportAck: false,\n    reportRef: '',\n    showEmptyParent: false,\n    schoolList: '',\n    schoolResults: null,\n  };\n\n  go = (screen) => {\n    this.setState(s => ({ screen, history: [...s.history, screen] }));\n  };\n  back = () => {\n    this.setState(s => {\n      const h = s.history.slice(0, -1);\n      return { history: h.length ? h : ['home'], screen: h.length ? h[h.length - 1] : 'home' };\n    });\n  };\n  onJump = (e) => this.go(e.target.value);\n  toggleViewport = () => this.setState(s => ({ viewport: s.viewport === 'mobile' ? 'desktop' : 'mobile' }));\n\n  onSearchChange = (e) => this.setState({ searchQuery: e.target.value });\n  doSearch = () => { if (this.state.searchQuery.trim()) this.go('result'); };\n\n  chooseAuth = (mode) => { this.go('report1'); };\n\n  onLoginEmailChange = (e) => this.setState({ loginEmail: e.target.value });\n  onLoginPassChange = (e) => this.setState({ loginPass: e.target.value });\n  doLogin = () => this.go('parent');\n\n  onRegNameChange = (e) => this.setState({ regName: e.target.value });\n  onRegEmailChange = (e) => this.setState({ regEmail: e.target.value });\n  onRegPassChange = (e) => this.setState({ regPass: e.target.value });\n  doRegister = () => this.go('verify');\n\n  handleDigit = (i, e) => {\n    const val = e.target.value.replace(/\\D/g, '').slice(-1);\n    const digits = [...this.state.codeDigits];\n    digits[i] = val;\n    this.setState({ codeDigits: digits, codeError: false });\n    if (val && e.target.nextElementSibling) e.target.nextElementSibling.focus();\n  };\n  verifyCode = () => {\n    const code = this.state.codeDigits.join('');\n    if (code.length === 6) this.go('parent');\n  };\n  resendCode = () => this.setState({ codeDigits: ['', '', '', '', '', ''], codeError: false });\n\n  onReportContactChange = (e) => this.setState({ reportContact: e.target.value });\n  onReportCityChange = (e) => this.setState({ reportCity: e.target.value });\n  onReportCountryChange = (e) => this.setState({ reportCountry: e.target.value });\n  onReportDateChange = (e) => this.setState({ reportDate: e.target.value });\n  onReportDescChange = (e) => this.setState({ reportDesc: e.target.value });\n  toggleReportAck = () => this.setState(s => ({ reportAck: !s.reportAck }));\n  submitReport = () => {\n    const ref = 'PI-' + Math.floor(100000 + Math.random() * 900000);\n    this.setState({ reportRef: ref });\n    this.go('confirmation');\n  };\n\n  toggleEmptyDemo = () => this.setState(s => ({ showEmptyParent: !s.showEmptyParent }));\n\n  onSchoolListChange = (e) => this.setState({ schoolList: e.target.value });\n  validateSchoolList = () => {\n    const lines = this.state.schoolList.split('\\n').map(l => l.trim()).filter(Boolean);\n    const source = lines.length ? lines : ['+57 300 123 4567', '@usuario_ejemplo', '+57 315 555 0000'];\n    const results = source.map((contact, i) => {\n      const count = i === 0 ? 4 : (i === 2 ? 1 : 0);\n      return { contact, count, label: count > 0 ? count + ' reportes registrados' : 'Sin coincidencias' };\n    });\n    this.setState({ schoolResults: results });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const isDesktop = s.viewport === 'desktop';\n\n    const styles = {};\n\n    styles.outer = {\n      minHeight: '100vh', width: '100%', background: C.bg,\n      display: 'flex', flexDirection: 'column', alignItems: 'center',\n      padding: isDesktop ? '32px 16px 100px' : '16px 12px 100px',\n      fontFamily: \"'Plus Jakarta Sans', sans-serif\", color: C.ink,\n    };\n\n    styles.stage = {\n      width: '100%', maxWidth: isDesktop ? '1200px' : '420px',\n      background: C.surface, borderRadius: isDesktop ? '24px' : '28px',\n      overflow: 'hidden', boxShadow: '0 20px 60px -20px rgba(30,45,60,0.25), 0 2px 12px rgba(30,45,60,0.08)',\n      minHeight: isDesktop ? '760px' : '780px',\n      border: `1px solid ${C.line}`,\n      transition: 'max-width 0.35s ease',\n    };\n\n    // ---- Home hero ----\n    styles.heroWrap = {\n      position: 'relative', overflow: 'hidden', minHeight: isDesktop ? '760px' : '780px',\n      background: `linear-gradient(150deg, ${C.primaryDark} 0%, ${C.primary} 55%, oklch(58% 0.1 175) 100%)`,\n      display: 'flex', flexDirection: 'column', padding: isDesktop ? '28px 56px' : '20px 20px',\n    };\n    styles.blob1 = { position: 'absolute', width: '360px', height: '360px', borderRadius: '50%', top: '-120px', left: '-100px', background: 'radial-gradient(circle, rgba(255,255,255,0.16), transparent 70%)', animation: 'drift1 14s ease-in-out infinite', filter: 'blur(2px)' };\n    styles.blob2 = { position: 'absolute', width: '300px', height: '300px', borderRadius: '50%', bottom: '-100px', right: '-80px', background: 'radial-gradient(circle, oklch(70% 0.11 165 / 0.35), transparent 70%)', animation: 'drift2 18s ease-in-out infinite', filter: 'blur(2px)' };\n    styles.blob3 = { position: 'absolute', width: '200px', height: '200px', borderRadius: '50%', top: '40%', right: '10%', background: 'radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%)', animation: 'drift3 11s ease-in-out infinite' };\n\n    styles.heroTop = { position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '12px' };\n    styles.brandRow = { display: 'flex', alignItems: 'center', gap: '10px' };\n    styles.shieldMark = { width: '30px', height: '30px', borderRadius: '9px', background: 'rgba(255,255,255,0.9)' };\n    styles.brandName = { fontWeight: 800, fontSize: '17px', color: '#fff', letterSpacing: '-0.01em' };\n    styles.authRow = { display: 'flex', alignItems: 'center', gap: '8px' };\n    styles.linkGhostLight = { background: 'none', border: 'none', color: 'rgba(255,255,255,0.85)', fontWeight: 600, fontSize: '14px', cursor: 'pointer', padding: '10px 6px' };\n    styles.btnLight = { background: 'rgba(255,255,255,0.95)', color: C.primaryDark, border: 'none', borderRadius: '999px', padding: '10px 18px', fontWeight: 700, fontSize: '14px', cursor: 'pointer' };\n\n    styles.heroCenter = { position: 'relative', zIndex: 1, flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: '14px', padding: isDesktop ? '40px 0' : '32px 0', maxWidth: isDesktop ? '640px' : 'none' };\n    styles.heroEyebrow = { color: 'oklch(85% 0.05 165)', fontWeight: 700, fontSize: '13px', letterSpacing: '0.06em', textTransform: 'uppercase' };\n    styles.heroTitle = { color: '#fff', fontSize: isDesktop ? '44px' : '32px', fontWeight: 800, margin: '4px 0 2px', letterSpacing: '-0.02em', lineHeight: 1.08 };\n    styles.heroSub = { color: 'rgba(255,255,255,0.85)', fontSize: '16px', lineHeight: 1.55, margin: '0 0 12px', maxWidth: '480px' };\n\n    styles.searchCard = { background: 'rgba(255,255,255,0.16)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)', border: '1px solid rgba(255,255,255,0.35)', borderRadius: '20px', padding: '18px', display: 'flex', flexDirection: 'column', gap: '10px', maxWidth: '520px' };\n    styles.searchLabel = { color: 'rgba(255,255,255,0.9)', fontSize: '13px', fontWeight: 600 };\n    styles.searchRow = { display: 'flex', gap: '8px' };\n    styles.searchInput = { flex: 1, minWidth: 0, height: '52px', borderRadius: '14px', border: 'none', padding: '0 16px', fontSize: '16px', background: 'rgba(255,255,255,0.95)', color: C.ink, outline: 'none' };\n    styles.searchBtn = { height: '52px', padding: '0 22px', borderRadius: '14px', border: 'none', background: C.accent, color: C.primaryDark, fontWeight: 700, fontSize: '15px', cursor: 'pointer', whiteSpace: 'nowrap' };\n    styles.searchHint = { color: 'rgba(255,255,255,0.7)', fontSize: '12.5px' };\n\n    styles.heroBottomLinks = { position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', gap: '10px', justifyContent: 'center', paddingTop: '8px' };\n    styles.dotSep = { color: 'rgba(255,255,255,0.4)' };\n\n    // ---- generic page ----\n    styles.page = { display: 'flex', flexDirection: 'column', minHeight: isDesktop ? '760px' : '780px' };\n    styles.topBar = { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: isDesktop ? '20px 40px' : '16px 16px', borderBottom: `1px solid ${C.line}` };\n    styles.backBtn = { background: 'none', border: 'none', color: C.primary, fontWeight: 700, fontSize: '15px', cursor: 'pointer', padding: '8px' };\n    styles.topBarTitle = { fontWeight: 800, fontSize: '16px', color: C.ink };\n    styles.topBarSpacer = { width: '56px' };\n    styles.content = { flex: 1, padding: isDesktop ? '32px 40px 40px' : '20px 18px 32px', display: 'flex', flexDirection: 'column', gap: '16px', maxWidth: isDesktop ? '640px' : 'none', width: '100%', margin: '0 auto', animation: 'floatUp 0.4s ease' };\n\n    styles.sectionTitle = { fontWeight: 800, fontSize: '15px', color: C.ink, marginTop: '4px' };\n    styles.sectionTitleSpaced = { fontWeight: 800, fontSize: '15px', color: C.ink, marginTop: '20px' };\n    styles.plainP = { fontSize: '15px', color: C.inkSoft, lineHeight: 1.6, margin: 0 };\n    styles.plainPMuted = { fontSize: '14px', color: C.inkFaint, lineHeight: 1.6, margin: '-6px 0 4px' };\n\n    // result screen\n    styles.resultHeadCard = { background: C.primarySoft, borderRadius: '18px', padding: '20px' };\n    styles.resultQuery = { fontFamily: \"'DM Mono', monospace\", fontSize: '18px', fontWeight: 500, color: C.primaryDark };\n    styles.resultCount = { fontSize: '14px', color: C.inkSoft, marginTop: '4px' };\n    styles.noticeBanner = { background: C.accentSoft, borderRadius: '14px', padding: '14px 16px', fontSize: '13.5px', color: 'oklch(35% 0.05 165)', lineHeight: 1.55 };\n\n    styles.glassCard = { background: 'oklch(98% 0.008 90)', border: `1px solid ${C.line}`, borderRadius: '18px', padding: '18px' };\n    styles.barChartRow = { display: 'flex', gap: '18px', alignItems: 'flex-end', height: '110px', marginTop: '12px', justifyContent: 'space-around' };\n    styles.barChartRowFlat = { display: 'flex', gap: '14px', alignItems: 'flex-end', height: '70px', marginTop: '10px' };\n\n    const maxCity = 2;\n    const cityData = [\n      { city: 'Bogotá', count: 2 }, { city: 'Medellín', count: 1 }, { city: 'Cali', count: 1 }, { city: 'Barranquilla', count: 0 }\n    ].map(c => ({ ...c, barStyle: { width: '34px', height: (14 + (c.count / maxCity) * 70) + 'px', background: c.count ? C.primary : C.line, borderRadius: '8px 8px 4px 4px' } }));\n\n    const monthData = [\n      { month: 'Abr', count: 1 }, { month: 'May', count: 0 }, { month: 'Jun', count: 2 }, { month: 'Jul', count: 1 }\n    ].map(m => ({ ...m, barStyle: { flex: 1, height: (8 + m.count * 18) + 'px', background: C.accent, borderRadius: '6px', opacity: m.count ? 1 : 0.25 } }));\n\n    styles.barCol = { display: 'flex', flexDirect
