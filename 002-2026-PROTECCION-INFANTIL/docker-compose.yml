version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proteccion
      POSTGRES_PASSWORD: ${DB_PASSWORD:-proteccion_dev}
      POSTGRES_DB: proteccion_infantil
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U proteccion" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
