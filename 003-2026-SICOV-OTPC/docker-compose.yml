# Infraestructura AISLADA del proyecto 003 (constitución §1.1).
# NO interfiere con 001 (:5432) ni 002 (:5433). Todo con prefijo 003- y puerto propio 5434.
# Sin Redis: la cola es table-driven sobre este mismo PostgreSQL, con advisory lock (NO usa pg-boss).
# Levantar: docker compose up -d   ·   Apagar sin perder datos: docker compose stop
services:
  db:
    image: postgres:16-alpine
    container_name: 003-2026-sicov-otpc-db-1
    environment:
      POSTGRES_USER: ${DB_USER:-sicov}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sicov_dev}
      POSTGRES_DB: ${DB_NAME:-sicov}
    ports:
      - "5434:5432"        # host 5434 -> contenedor 5432 (aislado de 001/002)
    volumes:
      - db_data:/var/lib/postgresql/data
    mem_limit: 512m         # límite de RAM desde el día 1 (convivencia con 001/002)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sicov} -d ${DB_NAME:-sicov}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    name: 003-2026-sicov-otpc_db_data
